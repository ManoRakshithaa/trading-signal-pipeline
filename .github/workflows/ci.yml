name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mlops-task .

      - name: Run container and capture output
        continue-on-error: true
        run: |
          docker run --rm mlops-task > full_output.txt 2>&1 || true
          echo "=== FULL OUTPUT ==="
          cat full_output.txt || echo "output file is empty"
          echo "=== END OUTPUT ==="

      - name: Extract and validate JSON
        run: |
          grep "^{" full_output.txt | tail -1 > output.json
          cat output.json
          python3 validate.py